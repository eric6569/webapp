<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>棒球測速器 ⚾</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%; background: #000; overflow: hidden;
      font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif;
      color: #fff;
    }
    #stage { position: fixed; inset: 0; }
    #cam, #overlay {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover;
    }
    #cam { background: #000; }
    #overlay { pointer-events: none; }

    #status {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 10px 14px; font-size: 14px;
      background: linear-gradient(to bottom, rgba(0,0,0,.6), rgba(0,0,0,0));
      z-index: 10; pointer-events: none; white-space: pre-line;
    }
    #startBtn {
      position: fixed; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      padding: 18px 36px; font-size: 20px; font-weight: bold;
      color: #fff; background: #e63946; border: none; border-radius: 999px;
      box-shadow: 0 6px 20px rgba(230,57,70,.5);
      z-index: 20; cursor: pointer;
    }
    #startBtn:active { transform: translate(-50%, -50%) scale(.96); }
    #startBtn:disabled { background: #888; box-shadow: none; }
    #bigReadout {
      position: fixed; left: 0; right: 0; top: 46px;
      text-align: center; z-index: 12; pointer-events: none;
      font-weight: 900; color: #39ff14;
      text-shadow: 0 2px 8px rgba(0,0,0,.9), 0 0 4px rgba(0,0,0,.9);
      line-height: 1.1;
    }
    #bigReadout .num { font-size: 13vw; }
    #bigReadout .unit { font-size: 5vw; }
    #bigReadout .sub { font-size: 4vw; color:#fff; opacity:.85; display:block; }
    #version {
      position: fixed; right: 6px; bottom: 4px;
      font-size: 12px; color: #fff; opacity: .6;
      z-index: 40; pointer-events: none;
    }
    #dbg {
      position: fixed; left: 6px; bottom: 4px; max-width: 70%;
      font-size: 13px; color: #ffd60a; z-index: 40; pointer-events: none;
      text-shadow: 0 1px 3px #000;
    }
    #error {
      position: fixed; left: 50%; top: 60%; transform: translateX(-50%);
      width: 86%; max-width: 420px; padding: 14px 16px;
      font-size: 14px; line-height: 1.6; color: #ffd9d9;
      background: rgba(120,0,0,.85); border-radius: 12px;
      z-index: 30; display: none; white-space: pre-wrap;
    }

    /* Toast 通知 */
    #toast {
      position: fixed; left: 50%; top: 40%; transform: translate(-50%, -50%);
      padding: 16px 28px; border-radius: 14px;
      background: rgba(42,157,143,.92); color: #fff;
      font-size: 18px; font-weight: bold; text-align: center;
      z-index: 60; pointer-events: none;
      opacity: 0; transition: opacity .3s;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 20px rgba(0,0,0,.5);
    }
    #toast.show { opacity: 1; }

    /* 齒輪按鈕 */
    #gearBtn {
      position: fixed; right: 12px; bottom: 28px;
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(255,255,255,.2); border: none;
      color: #fff; font-size: 26px; z-index: 16;
      cursor: pointer; display: none; backdrop-filter: blur(4px);
    }
    #gearBtn:active { transform: scale(.92); }

    /* 設定頁面 overlay */
    #settings {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,.92); backdrop-filter: blur(8px);
      display: none; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 0 0 40px;
    }
    #settings.show { display: block; }
    #settings .hdr {
      position: sticky; top: 0; z-index: 1;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; background: rgba(0,0,0,.85);
      border-bottom: 1px solid rgba(255,255,255,.15);
      font-size: 18px; font-weight: bold;
    }
    #settings .hdr button {
      background: none; border: none; color: #fff;
      font-size: 28px; cursor: pointer; padding: 0 4px;
    }
    #settings .section {
      padding: 14px 16px 6px;
      font-size: 13px;
    }
    #settings .section-title {
      font-size: 14px; font-weight: bold; color: #aaa;
      margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;
    }
    .row { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
    .row label { width: 100px; flex: none; font-size: 14px; }
    .row input[type=range] { flex: 1; }
    .row .val { width: 44px; text-align: right; font-variant-numeric: tabular-nums; }
    .row.chk { gap: 8px; }
    .row.chk label { width: auto; }
    .mode-btns { display: flex; gap: 8px; margin: 6px 0 10px; }
    .mode-btns button {
      flex: 1; padding: 10px; border: 2px solid #555; border-radius: 10px;
      background: transparent; color: #fff; font-size: 14px; font-weight: bold;
      cursor: pointer;
    }
    .mode-btns button.active { border-color: #39ff14; color: #39ff14; }
    .calib-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; flex-wrap: wrap; }
    .calib-row button {
      padding: 8px 12px; border: none; border-radius: 8px;
      color: #fff; font-size: 13px; cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="stage">
    <video  id="cam" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
  </div>

  <div id="status">📷 等待啟動…</div>
  <div id="bigReadout"></div>
  <div id="dbg"></div>
  <div id="version">v0.7.8</div>
  <button id="startBtn">▶ 開啟後鏡頭</button>
  <div id="error"></div>
  <button id="gearBtn">⚙</button>
  <div id="toast"></div>

  <!-- 設定頁面 -->
  <div id="settings">
    <div class="hdr">
      <span>⚙ 設定</span>
      <button id="closeSettings">✕</button>
    </div>

    <div class="section">
      <div class="section-title">偵測模式</div>
      <div class="mode-btns">
        <button id="modeMotion">🏃 動態偵測</button>
        <button id="modeBright">💡 亮度偵測</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">比例尺校正</div>
      <div style="margin:4px 0 8px;color:#ccc" id="calibState">未校正</div>
      <div class="calib-row">
        <label style="width:auto;font-size:14px">已知長度cm</label>
        <input type="number" id="calibDist" value="100" style="width:64px;padding:6px;border-radius:6px;border:1px solid #555;background:#222;color:#fff">
      </div>
      <div class="calib-row">
        <button id="calibStart" style="flex:1;background:#2a9d8f">📏 開始：點兩端</button>
        <button id="calibClear" style="background:#555">清除</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">偵測參數</div>
      <div class="row">
        <label>處理解析度</label>
        <input type="range" id="thProc" min="160" max="960" step="80" value="320">
        <span class="val" id="vProc">320</span>
      </div>
      <div id="rowMotion" class="row" style="display:none">
        <label>移動靈敏度</label>
        <input type="range" id="thMot" min="8" max="80" value="50">
        <span class="val" id="vMot">50</span>
      </div>
      <div id="rowBright" class="row">
        <label>亮度門檻</label>
        <input type="range" id="thBright" min="120" max="255" value="200">
        <span class="val" id="vBright">200</span>
      </div>
      <div id="rowSat" class="row">
        <label>飽和度上限</label>
        <input type="range" id="thSat" min="0" max="150" value="60">
        <span class="val" id="vSat">60</span>
      </div>
      <div class="row">
        <label>最小尺寸(px)</label>
        <input type="range" id="thMin" min="2" max="40" value="6">
        <span class="val" id="vMin">6</span>
      </div>
      <div class="row">
        <label>最大尺寸(px)</label>
        <input type="range" id="thMax" min="20" max="320" value="120">
        <span class="val" id="vMax">120</span>
      </div>
      <div class="row">
        <label>偵測頻率fps</label>
        <input type="range" id="thFps" min="5" max="60" value="20">
        <span class="val" id="vFps">20</span>
      </div>
      <div class="row">
        <label>判定週期ms</label>
        <input type="range" id="thGap" min="200" max="5000" step="100" value="2000">
        <span class="val" id="vGap">2000</span>
      </div>
      <div class="row">
        <label>R²門檻</label>
        <input type="range" id="thR2" min="0" max="0.9" step="0.05" value="0.4">
        <span class="val" id="vR2">0.4</span>
      </div>
      <div class="row">
        <label>最小位移px</label>
        <input type="range" id="thDxMin" min="1" max="80" value="10">
        <span class="val" id="vDxMin">10</span>
      </div>
      <div class="row">
        <label>出手門檻km/h</label>
        <input type="range" id="thThrow" min="5" max="60" value="15">
        <span class="val" id="vThrow">15</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">其他</div>
      <div class="row chk">
        <input type="checkbox" id="showMask">
        <label for="showMask">顯示偵測遮罩（除錯用）</label>
      </div>
      <div class="row chk">
        <input type="checkbox" id="voiceOn" checked>
        <label for="voiceOn">🔊 語音報速</label>
      </div>
    </div>
  </div>

  <script>
    const video    = document.getElementById('cam');
    const overlay  = document.getElementById('overlay');
    const ctx      = overlay.getContext('2d');
    const statusEl = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    const errorEl  = document.getElementById('error');
    const gearBtn  = document.getElementById('gearBtn');
    const settingsEl = document.getElementById('settings');

    // 控制元件
    const thProc   = document.getElementById('thProc');
    const vProc    = document.getElementById('vProc');
    const thBright = document.getElementById('thBright');
    const thSat    = document.getElementById('thSat');
    const thMin    = document.getElementById('thMin');
    const thMax    = document.getElementById('thMax');
    const showMask = document.getElementById('showMask');
    const vBright  = document.getElementById('vBright');
    const vSat     = document.getElementById('vSat');
    const vMin     = document.getElementById('vMin');
    const vMax     = document.getElementById('vMax');
    const thMot    = document.getElementById('thMot');
    const vMot     = document.getElementById('vMot');
    const rowBright= document.getElementById('rowBright');
    const rowSat   = document.getElementById('rowSat');
    const rowMotion= document.getElementById('rowMotion');
    const bigReadout = document.getElementById('bigReadout');
    const thFps    = document.getElementById('thFps');
    const vFps     = document.getElementById('vFps');
    const thGap    = document.getElementById('thGap');
    const vGap     = document.getElementById('vGap');
    const thR2     = document.getElementById('thR2');
    const vR2      = document.getElementById('vR2');
    const thDxMin  = document.getElementById('thDxMin');
    const vDxMin   = document.getElementById('vDxMin');
    const thThrow  = document.getElementById('thThrow');
    const vThrow   = document.getElementById('vThrow');
    const voiceOn  = document.getElementById('voiceOn');

    // 校正元件
    const calibState = document.getElementById('calibState');
    const calibDist = document.getElementById('calibDist');
    const calibStartBtn = document.getElementById('calibStart');
    const calibClearBtn = document.getElementById('calibClear');

    // 模式按鈕
    const modeMotionBtn = document.getElementById('modeMotion');
    const modeBrightBtn = document.getElementById('modeBright');

    const BALL_CM = 7.3;
    let pxPerMeter = null;
    let calibPicking = false;
    let calibPt1 = null;

    // ---- 速度量測狀態 ----
    let track = [];
    let throwActive = false;
    let lastSpeed = null;
    let lastDetectT = 0;

    // 直線擬合估速（側面版）：cx(px) vs t → 斜率=px/s → m/s → km/h
    function estimateSpeed(s){
      const n = s.length;
      if (n < 2) return { valid:false, n };
      const r2Min = +(thR2.value) || 0.4;
      const dxMin = +(thDxMin.value) || 10;
      const t0 = s[0].t;
      const span = (s[n-1].t - t0)/1000;
      const dxPx = s[n-1].cx - s[0].cx;
      if (n === 2){
        const slopePx = span>0 ? dxPx/span : 0;
        let reason='';
        if (Math.abs(dxPx)<dxMin) reason='移動太小';
        else if (span<0.02) reason='時間太短';
        else if (!pxPerMeter) reason='未校正';
        const ms = pxPerMeter ? Math.abs(slopePx)/pxPerMeter : 0;
        return { valid:reason===''&&ms>0, kmh:ms*3.6, r2:1, n, dxPx, slopePx, reason };
      }
      let sx=0, sy=0, sxx=0, sxy=0;
      for (const p of s){ const x=(p.t-t0)/1000, y=p.cx; sx+=x; sy+=y; sxx+=x*x; sxy+=x*y; }
      const den = n*sxx - sx*sx;
      if (den === 0) return { valid:false, n, reason:'時間重疊' };
      const slopePx = (n*sxy - sx*sy)/den;
      const intercept = (sy - slopePx*sx)/n;
      let ssTot=0, ssRes=0; const my=sy/n;
      for (const p of s){ const x=(p.t-t0)/1000, y=p.cx; const f=slopePx*x+intercept; ssRes+=(y-f)*(y-f); ssTot+=(y-my)*(y-my); }
      const r2 = ssTot>0 ? 1 - ssRes/ssTot : 0;
      let reason='';
      if (Math.abs(dxPx)<dxMin) reason='移動太小';
      else if (r2<r2Min) reason='不線性';
      else if (span<0.03) reason='時間太短';
      else if (!pxPerMeter) reason='未校正';
      const ms = pxPerMeter ? Math.abs(slopePx)/pxPerMeter : 0;
      return { valid:reason===''&&ms>0, kmh:ms*3.6, r2, n, dxPx, slopePx, reason };
    }

    // ---- 語音報速（念兩次）----
    function speak(kmh){
      if(!voiceOn.checked || !window.speechSynthesis) return;
      try {
        const txt = `${Math.round(kmh)}`;
        speechSynthesis.cancel();
        const u1 = new SpeechSynthesisUtterance(txt);
        u1.lang = 'zh-TW'; u1.rate = 0.75;
        const u2 = new SpeechSynthesisUtterance(txt);
        u2.lang = 'zh-TW'; u2.rate = 0.75;
        speechSynthesis.speak(u1);
        speechSynthesis.speak(u2);
      } catch(e){}
    }
    function warmupVoice(){
      if(!window.speechSynthesis) return;
      try { const w=new SpeechSynthesisUtterance(' '); w.volume=0; speechSynthesis.speak(w); } catch(e){}
    }

    // 滑桿同步
    function bind(sl, lab){ sl.oninput = () => { lab.textContent = sl.value; saveSettings(); }; }
    bind(thProc,vProc); bind(thMot,vMot); bind(thBright,vBright); bind(thSat,vSat);
    bind(thMin,vMin); bind(thMax,vMax);
    // 處理解析度變更時同步 proc canvas
    thProc.addEventListener('input', syncSize);
    bind(thFps,vFps); bind(thGap,vGap); bind(thR2,vR2); bind(thDxMin,vDxMin); bind(thThrow,vThrow);

    // ---- 設定持久化 ----
    const LS_KEY = 'ballspeed_settings_v3';
    function saveSettings(){
      try {
        localStorage.setItem(LS_KEY, JSON.stringify({
          mode, pxPerMeter, calibDist: calibDist.value,
          thMot:thMot.value, thBright:thBright.value, thSat:thSat.value,
          thProc:thProc.value, thMin:thMin.value, thMax:thMax.value,
          thFps:thFps.value, thGap:thGap.value,
          thR2:thR2.value, thDxMin:thDxMin.value, thThrow:thThrow.value
        }));
      } catch(e){}
    }
    function loadSettings(){
      let s; try { s = JSON.parse(localStorage.getItem(LS_KEY)); } catch(e){}
      if(!s) return;
      const set=(el,lab,v)=>{ if(v!=null){ el.value=v; if(lab)lab.textContent=v; } };
      set(thMot,vMot,s.thMot); set(thBright,vBright,s.thBright); set(thSat,vSat,s.thSat);
      set(thProc,vProc,s.thProc); set(thMin,vMin,s.thMin); set(thMax,vMax,s.thMax);
      set(thFps,vFps,s.thFps); set(thGap,vGap,s.thGap);
      set(thR2,vR2,s.thR2); set(thDxMin,vDxMin,s.thDxMin); set(thThrow,vThrow,s.thThrow);
      if(s.calibDist!=null) calibDist.value=s.calibDist;
      if(s.pxPerMeter){ pxPerMeter=s.pxPerMeter; calibState.textContent=`✓ ${pxPerMeter.toFixed(1)}px/m`; }
      if(s.mode){ mode=s.mode; applyMode(); }
    }

    // ---- 偵測模式：'bright' / 'motion' ----
    let mode = 'motion';
    function applyMode(){
      rowBright.style.display = mode==='bright'?'flex':'none';
      rowSat.style.display    = mode==='bright'?'flex':'none';
      rowMotion.style.display = mode==='motion'?'flex':'none';
      modeMotionBtn.classList.toggle('active', mode==='motion');
      modeBrightBtn.classList.toggle('active', mode==='bright');
    }
    modeMotionBtn.addEventListener('click', () => { mode='motion'; applyMode(); saveSettings(); });
    modeBrightBtn.addEventListener('click', () => { mode='bright'; applyMode(); saveSettings(); });
    applyMode();

    // ---- 設定頁面開關 ----
    gearBtn.addEventListener('click', () => { settingsEl.classList.add('show'); });
    document.getElementById('closeSettings').addEventListener('click', () => { settingsEl.classList.remove('show'); });

    // ---- 比例尺校正 ----
    calibStartBtn.addEventListener('click', () => {
      calibPicking = true; calibPt1 = null;
      calibState.textContent = '👆 請點第一端';
      calibStartBtn.textContent = '等待點擊…';
      settingsEl.classList.remove('show');   // 關設定頁，回到鏡頭畫面點
    });
    calibClearBtn.addEventListener('click', () => {
      pxPerMeter = null; calibPicking = false; calibPt1 = null;
      calibState.textContent = '未校正';
      calibStartBtn.textContent = '📏 開始：點兩端';
      saveSettings();
    });

    // 點畫面：比例尺校正兩點
    function screenToProc(ev){
      const elW=overlay.clientWidth, elH=overlay.clientHeight;
      const vw=video.videoWidth, vh=video.videoHeight;
      const scale=Math.max(elW/vw, elH/vh);
      const offX=(elW-vw*scale)/2, offY=(elH-vh*scale)/2;
      const vidX=(ev.clientX-offX)/scale, vidY=(ev.clientY-offY)/scale;
      return { x:Math.round(vidX*proc.width/vw), y:Math.round(vidY*proc.height/vh) };
    }
    document.getElementById('stage').addEventListener('click', (ev) => {
      if (!video.videoWidth || !calibPicking) return;
      const pt = screenToProc(ev);
      if (!calibPt1){
        calibPt1 = pt;
        calibState.textContent = '👆 請點第二端';
      } else {
        const dx = pt.x - calibPt1.x, dy = pt.y - calibPt1.y;
        const pxDist = Math.sqrt(dx*dx + dy*dy);
        const knownCm = parseFloat(calibDist.value);
        if (!knownCm || knownCm<=0){ calibState.textContent='⚠ 長度無效'; calibPicking=false; return; }
        if (pxDist < 5){ calibState.textContent='⚠ 兩點太近'; calibPt1=null; return; }
        pxPerMeter = pxDist / (knownCm/100);
        calibState.textContent = `✓ ${pxPerMeter.toFixed(1)}px/m (${pxDist.toFixed(0)}px↔${knownCm}cm)`;
        calibPicking = false; calibPt1 = null;
        calibStartBtn.textContent = '📏 重新校正';
        saveSettings();
        showToast(`✅ 校正完成\n${pxPerMeter.toFixed(1)} px/m`);
      }
    });

    let stream = null, running = false, lastT = performance.now();
    let prevGray = null, motionBuf = null;

    let PROC_W = 320;
    let PROC_H = 180;
    const proc = document.createElement('canvas');
    const pctx = proc.getContext('2d', { willReadFrequently: true });

    function setStatus(t){ statusEl.textContent = t; }
    function showError(m){ errorEl.style.display='block'; errorEl.textContent='⚠ '+m; }

    // ---- Toast 通知（自動 3 秒消失）----
    let toastTimer = null;
    function showToast(msg){
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(()=>{ el.classList.remove('show'); }, 2000);
    }

    // ---- 開鏡頭 ----
    async function startCamera() {
      errorEl.style.display='none';
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showError('此瀏覽器無法存取鏡頭。\n請用 HTTPS（GitHub Pages）或 localhost，手機勿用區網 IP。');
        return;
      }
      startBtn.disabled = true; setStatus('📷 啟動鏡頭中…');
      warmupVoice();
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { exact: 'environment' } }, audio: false });
      } catch (e1) {
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment' }, audio: false });
        } catch (e2) { handleCameraError(e2); return; }
      }
      video.srcObject = stream;
      await video.play();
      startBtn.style.display='none';
      gearBtn.style.display='block';
      loadSettings();

      await waitForVideoReady();
      syncSize();
      window.addEventListener('resize', syncSize);

      running = true;
      setStatus('✅ 偵測中…');
      detectLoop();
    }

    function waitForVideoReady(){
      return new Promise(r=>{
        if (video.readyState>=2 && video.videoWidth) return r();
        video.onloadedmetadata = ()=>r();
      });
    }

    function syncSize(){
      const vw = video.videoWidth, vh = video.videoHeight;
      if (!vw||!vh) return;
      overlay.width = vw; overlay.height = vh;
      PROC_W = +(thProc.value) || 320;
      PROC_H = Math.round(PROC_W * vh / vw);
      proc.width = PROC_W; proc.height = PROC_H;
      // 重置動態偵測緩衝（解析度變了，舊的無效）
      prevGray = null; motionBuf = null;
    }

    // ---- 偵測迴圈 ----
    const visited = new Uint8Array(960 * 720); // 最大解析度 960 的上限緩衝
    let lastDetectFrame = 0;
    function detectLoop(){
      if (!running) return;
      const now = performance.now();
      const interval = 1000 / (+thFps.value || 20);
      if (now - lastDetectFrame >= interval){
        lastDetectFrame = now;
        const ball = detectBall();
        draw(ball);
      }
      requestAnimationFrame(detectLoop);
    }

    function detectBall(){
      const W = proc.width, H = proc.height, N = W*H;
      pctx.drawImage(video, 0, 0, W, H);
      const data = pctx.getImageData(0, 0, W, H).data;

      const TB = +thBright.value;
      const TS = +thSat.value;

      const rx0 = 0, rx1 = W;
      const ry0 = 0, ry1 = H;

      const MT  = +thMot.value;
      const useMotion = (mode==='motion');

      let gray = null;
      if (useMotion){
        gray = (motionBuf && motionBuf.length===N) ? motionBuf : new Uint8Array(N);
      }

      const mask = new Uint8Array(N);
      for (let y=ry0;y<ry1;y++){
        for (let x=rx0;x<rx1;x++){
          const i=y*W+x;
          const r=data[i*4], g=data[i*4+1], b=data[i*4+2];
          if (useMotion){
            const gv=(r*0.299+g*0.587+b*0.114)|0;
            if (prevGray && prevGray.length===N && Math.abs(gv-prevGray[i])>MT) mask[i]=1;
            gray[i]=gv;
          } else {
            const max=Math.max(r,g,b), min=Math.min(r,g,b);
            if (max>=TB && (max-min)<=TS) mask[i]=1;
          }
        }
      }
      if (useMotion){ motionBuf = prevGray; prevGray = gray; }

      const vis = (N<=visited.length) ? visited : new Uint8Array(N);
      vis.fill(0, 0, N);
      const stack = new Int32Array(N);
      const minPx = +thMin.value;
      const maxPx = +thMax.value;
      let best = null, bestScore = -1;

      for (let s=0;s<N;s++){
        if (!mask[s] || vis[s]) continue;
        let sp=0; stack[sp++]=s; vis[s]=1;
        let area=0, minX=W,maxX=0,minY=H,maxY=0, sumX=0,sumY=0;
        while (sp>0){
          const p=stack[--sp];
          const x=p%W, y=(p/W)|0;
          area++; sumX+=x; sumY+=y;
          if(x<minX)minX=x; if(x>maxX)maxX=x;
          if(y<minY)minY=y; if(y>maxY)maxY=y;
          if(x>0   && mask[p-1] && !vis[p-1]){vis[p-1]=1; stack[sp++]=p-1;}
          if(x<W-1 && mask[p+1] && !vis[p+1]){vis[p+1]=1; stack[sp++]=p+1;}
          if(y>0   && mask[p-W] && !vis[p-W]){vis[p-W]=1; stack[sp++]=p-W;}
          if(y<H-1 && mask[p+W] && !vis[p+W]){vis[p+W]=1; stack[sp++]=p+W;}
        }
        const bw=maxX-minX+1, bh=maxY-minY+1;
        if (bw<minPx || bh<minPx) continue;
        if (bw>maxPx || bh>maxPx) continue;
        const fill = area/(bw*bh);
        const aspect = bw>bh ? bw/bh : bh/bw;
        const fillMin = useMotion ? 0.35 : 0.6;
        const aspMax  = useMotion ? 3.0  : 1.4;
        if (fill < fillMin || aspect > aspMax) continue;
        const circ = (1 - Math.abs(fill - 0.785)) / aspect;
        if (circ > bestScore){
          bestScore = circ;
          best = { cx:sumX/area, cy:sumY/area, bw, bh, area, fill,
                   diam:(bw+bh)/2 };
        }
      }
      return { best, mask, W, H };
    }

    function draw(res){
      const sx = overlay.width / res.W;
      const sy = overlay.height / res.H;
      ctx.clearRect(0,0,overlay.width,overlay.height);

      if (showMask.checked){
        const img = ctx.createImageData(res.W, res.H);
        for (let i=0;i<res.W*res.H;i++){
          const v = res.mask[i]?255:0;
          img.data[i*4]=v; img.data[i*4+1]=v; img.data[i*4+2]=0; img.data[i*4+3]=v?140:0;
        }
        const tmp = document.createElement('canvas');
        tmp.width=res.W; tmp.height=res.H;
        tmp.getContext('2d').putImageData(img,0,0);
        ctx.drawImage(tmp, 0,0, overlay.width, overlay.height);
      }

      // （全畫面偵測，不畫 ROI 框）

      const now=performance.now(), fps=1000/(now-lastT); lastT=now;
      const THROW_MIN = +thThrow.value;

      if (track.length > 0 && (now - lastDetectT) > (+thGap.value || 2000)){
        const r = estimateSpeed(track);
        const dbg = document.getElementById('dbg');
        let why = r.reason || '';
        if (r.valid && r.kmh < THROW_MIN) why = `低於門檻(${r.kmh.toFixed(0)}<${THROW_MIN})`;
        if (r.valid && r.kmh >= THROW_MIN){
          lastSpeed = r.kmh;
          speak(lastSpeed);
          dbg.textContent = `✅報速 點${r.n} R²${(r.r2||0).toFixed(2)} Δ${(r.dxPx||0).toFixed(0)}px 速${r.kmh.toFixed(0)}`;
        } else {
          dbg.textContent = `❌${why} 點${r.n} R²${(r.r2!=null?r.r2.toFixed(2):'-')} Δ${(r.dxPx!=null?r.dxPx.toFixed(0):'-')}px 速${r.kmh!=null?r.kmh.toFixed(0):'-'}`;
        }
        throwActive = false; track = [];
      }

      if (res.best){
        const b=res.best;
        const cx=b.cx*sx, cy=b.cy*sy;
        const rpx=(b.diam*((sx+sy)/2))/2;
        ctx.lineWidth=6; ctx.strokeStyle='#39ff14';
        ctx.beginPath(); ctx.arc(cx,cy,rpx,0,Math.PI*2); ctx.stroke();
        ctx.fillStyle='#39ff14';
        ctx.beginPath(); ctx.arc(cx,cy,4,0,Math.PI*2); ctx.fill();
        const diamOverlay = b.diam*((sx+sy)/2);

        ctx.font='bold 26px sans-serif'; ctx.fillStyle='#39ff14';
        ctx.fillText(`⚾ ${diamOverlay.toFixed(0)}px`, cx+rpx+8, cy);

        track.push({ t:now, cx:b.cx });
        if (track.length>60) track.shift();
        lastDetectT = now;
        let curKmh = null;
        const live = estimateSpeed(track);
        if (live.valid){
          curKmh = live.kmh;
          if (live.kmh >= THROW_MIN) throwActive = true;
        }
        updateBigReadout(throwActive && curKmh!=null ? curKmh : null);
        setStatus(`✅ ${fps.toFixed(0)}fps ${mode}　點${track.length} R²${live.r2!=null?live.r2.toFixed(2):'-'}`
          + (pxPerMeter?` 比例尺${pxPerMeter.toFixed(1)}px/m`:' ⚠未校正')
          + (curKmh!=null?` 即時${curKmh.toFixed(0)}km/h`:''));
      } else {
        updateBigReadout(null);
      }
    }

    function updateBigReadout(activeMax){
      if (activeMax!=null && activeMax>0){
        bigReadout.innerHTML = `<span class="num" style="color:#ffd60a">${activeMax.toFixed(0)}</span><span class="unit"> km/h</span><span class="sub">測量中…</span>`;
      } else if (lastSpeed!=null){
        bigReadout.innerHTML = `<span class="num">${lastSpeed.toFixed(0)}</span><span class="unit"> km/h</span><span class="sub">最後球速</span>`;
      } else {
        bigReadout.innerHTML = '';
      }
    }

    function handleCameraError(err){
      let msg;
      switch(err&&err.name){
        case 'NotAllowedError': msg='鏡頭權限被拒絕。請允許鏡頭後重新整理。'; break;
        case 'NotFoundError': msg='找不到鏡頭裝置。'; break;
        case 'NotReadableError': msg='鏡頭被其他 App 佔用。'; break;
        case 'OverconstrainedError': msg='此裝置不支援後鏡頭要求。'; break;
        default: msg='無法開啟鏡頭：'+(err&&err.message?err.message:err);
      }
      showError(msg); setStatus('❌ 鏡頭開啟失敗');
      startBtn.disabled=false; startBtn.style.display='block';
    }

    startBtn.addEventListener('click', startCamera);
  </script>
</body>
</html>
